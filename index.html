<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아케인 배라지 (Arcane Barrage)</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <canvas id="gameCanvas" width="1000" height="600"></canvas>
    <div id="ui">
        <div id="topBar">
            <span id="stageDisplay">Stage 1</span>
            <span id="timeDisplay">00:00</span>
            <span id="levelDisplay">Lv.1</span>
            <span id="killDisplay">0</span>
            <button id="menuBtn" class="topBarBtn" onclick="toggleMenu()">☰ 메뉴 (ESC)</button>
            <button id="bgmBtn" class="topBarBtn" onclick="toggleBgm()">🎵 BGM ON (B)</button>
            <button id="sfxBtn" class="topBarBtn" onclick="toggleSfx()">🔊 SFX ON (N)</button>
        </div>
        <div id="xpBar">
            <div id="xpFill" style="width:0%"></div>
        </div>

        <!-- 치트 버튼 -->
        <div id="devTools">
            <button class="devBtn" onclick="killAllEnemies()">💀 모든 적 제거 [R]</button>
            <button class="devBtn" onclick="forceLevelUp()">⭐ 강제 레벨업 [U]</button>
            <button class="devBtn" onclick="forceNextStage()">🚀 다음 스테이지 [I]</button>
            <button class="devBtn" onclick="absorbAllExp()">🧲 경험치 흡수 [E]</button>
        </div>

        <div id="levelUp">
            <h2>LEVEL UP! <span id="pendingLevelUpCount"
                    style="font-size: 18px; color: #ffeb3b; margin-left:10px;"></span></h2>
            <div id="cards"></div>
        </div>
        <div id="gameOver">
            <h2>GAME OVER</h2>
            <p id="goTime"></p>
            <p id="goKills"></p>
            <button class="mainBtn" onclick="startGame(isAdmin)">게임 다시하기</button>
            <button class="mainBtn danger" onclick="goToMainMenu()" style="margin-top:16px;">메인으로</button>
        </div>

        <!-- 메인 화면 -->
        <div id="mainMenu" class="overlayScreen">
            <h1>아케인 배라지</h1>
            <p>끝없이 다가오는 적들을 물리치세요!</p>
            <p id="mainHighScore" style="color: #ffcc00; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px #ffaa00;"></p>
            <button class="mainBtn" onclick="startGame(false)">게임 시작 (일반)</button>

            <div id="adminLogin" style="margin-top: 40px; display: flex; flex-direction: column; align-items: center;">
                <input type="text" id="adminId" placeholder="아이디"
                    style="padding:8px; margin-bottom:8px; width:220px; border-radius:4px; border:1px solid #aa44ff; background:#1a0030; color:#fff; text-align:center;">
                <input type="password" id="adminPw" placeholder="비밀번호"
                    style="padding:8px; margin-bottom:8px; width:220px; border-radius:4px; border:1px solid #aa44ff; background:#1a0030; color:#fff; text-align:center;">
                <button class="mainBtn" style="font-size:16px; padding:10px; width:220px;" onclick="tryAdminLogin()">관리자
                    계정으로 시작</button>
                <div id="loginMsg" style="color:#ff4444; font-size:14px; margin-top:8px; height:20px;"></div>
            </div>
        </div>

        <!-- 일시정지 메뉴 화면 -->
        <div id="pauseMenu" class="overlayScreen" style="display:none;">
            <h2>⏸ 일시 정지</h2>
            <button class="mainBtn" onclick="toggleMenu()">▶ 이어하기 (ESC)</button>
            <button class="mainBtn" onclick="startGame(isAdmin)" style="margin-top:16px;">🔄 게임 다시하기</button>
            <button class="mainBtn danger" onclick="goToMainMenu()" style="margin-top:16px;">🏠 메인으로</button>
        </div>
    </div>

    <!--
  JS 로드 순서 (의존성 순서를 지켜야 함)
  0. audio      - 효과음 (playSound 함수 등)
  1. constants  - 상수 / SKILLS / ENEMY_TIER 등 전역 데이터
  2. state      - 게임 상태 초기화 (startGame)
  3. skills     - 레벨업 UI (showLevelUp, getSkillCards)
  4. enemy      - 적 스폰 (spawnEnemy, dist)
  5. player     - 플레이어 이동 & 무기 (keys, updatePlayer*, fire*, update*)
  6. draw       - 렌더링 (canvas 참조 → DOM 필요)
  7. update     - 메인 업데이트 루프 (update)
  8. main       - 진입점 (startGame + loop 호출)
-->
    <script src="js/audio.js"></script>
    <script src="js/constants.js"></script>
    <script src="js/state.js"></script>
    <script src="js/skills.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/player.js"></script>
    <script src="js/draw.js"></script>
    <script src="js/update.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
